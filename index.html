<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ライフプラン">
<meta name="theme-color" content="#085041">
<meta name="description" content="家族の将来の資産・収支を30年間シミュレーション">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ライフプラン シミュレーター</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --green-dark: #085041;
  --green-mid: #0F6E56;
  --green-light: #1D9E75;
  --green-pale: #EAF5EC;
  --green-bg: #F8FFF9;
  --green-border: #9FE1CB;
  --green-border2: #D3F0DA;
  --red: #993C1D;
  --red-light: #FAECE7;
  --amber: #854F0B;
  --amber-light: #FAEEDA;
  --text: #1A1A18;
  --text2: #3D3D3A;
  --text3: #6B6B68;
  --radius: 10px;
  --radius-sm: 6px;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--green-pale); }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 14px; color: var(--text); overflow-x: hidden; }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100dvh; }
.header { background: var(--green-dark); color: #E1F5EE; padding: 12px 16px; padding-top: calc(12px + var(--safe-top)); display: flex; align-items: center; gap: 10px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header h1 { font-size: 16px; font-weight: 600; flex: 1; }
.header .version { font-size: 11px; opacity: .6; }
.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; padding-bottom: calc(80px + var(--safe-bot)); }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 0.5px solid var(--green-border); display: flex; padding-bottom: var(--safe-bot); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; font-size: 10px; color: var(--text3); cursor: pointer; border: none; background: none; }
.nav-item i { font-size: 22px; }
.nav-item.active { color: var(--green-dark); }
.nav-item.active i { color: var(--green-dark); }

/* ── cards ── */
.card { background: #fff; border: 0.5px solid var(--green-border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.sec { font-size: 10px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px; margin-top: 14px; padding-bottom: 5px; border-bottom: 0.5px solid var(--green-border); }
.sec:first-child { margin-top: 0; }

/* ── save bar ── */
.save-card { background: #fff; border: 0.5px solid var(--green-border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
.save-row { display: flex; gap: 7px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.save-row:last-child { margin-bottom: 0; }
.sinput { flex: 1; min-width: 0; padding: 8px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--green-border); background: var(--green-bg); color: var(--text); font-size: 13px; }
select.sinput { cursor: pointer; }
.btn { padding: 8px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--green-border); background: #fff; color: var(--green-dark); font-size: 12px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-p { background: var(--green-dark); color: #E1F5EE; border-color: var(--green-dark); }
.btn-d { border-color: #F0997B; color: var(--red); }

/* ── form ── */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field label { display: block; font-size: 11px; color: var(--green-mid); margin-bottom: 3px; font-weight: 500; }
.field input, .field select { width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--green-border); background: var(--green-bg); color: var(--text); font-size: 13px; }
.field { margin-bottom: 8px; }

/* ── family grid ── */
.fgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 7px; margin-bottom: 8px; }
.fcard { border: 0.5px solid var(--green-border); border-radius: var(--radius-sm); padding: 8px; background: var(--green-bg); }
.fcard .fn { font-size: 12px; font-weight: 600; color: var(--green-dark); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.fcard .frow { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--green-mid); }
.fcard input { width: 55px; padding: 4px 6px; font-size: 12px; border: 0.5px solid var(--green-border); border-radius: 4px; background: #fff; color: var(--text); text-align: center; }
.bdel { padding: 1px 6px; border-radius: 4px; border: 0.5px solid var(--green-border); background: transparent; color: #bbb; font-size: 11px; cursor: pointer; }

/* ── add rows ── */
.add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
.add-row input { padding: 7px 9px; border: 0.5px solid var(--green-border); border-radius: var(--radius-sm); font-size: 12px; background: var(--green-bg); color: var(--text); }
.badd { padding: 8px 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--green-mid); background: var(--green-mid); color: #E1F5EE; font-size: 14px; font-weight: 600; cursor: pointer; }

/* ── income rows ── */
.inc-hdr { display: grid; grid-template-columns: 1fr 52px 56px 56px 50px 28px; gap: 4px; margin-bottom: 4px; }
.inc-hdr span { font-size: 10px; color: var(--green-mid); text-align: right; font-weight: 500; }
.inc-hdr span:first-child { text-align: left; }
.irow { display: grid; grid-template-columns: 1fr 52px 56px 56px 50px 28px; gap: 4px; align-items: center; margin-bottom: 6px; }
.irow .il { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.irow input { padding: 5px 5px; border: 0.5px solid var(--green-border); border-radius: 4px; font-size: 11px; background: var(--green-bg); color: var(--text); width: 100%; text-align: right; }

/* ── exp rows ── */
.exp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.exp-row .el { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.exp-row input { width: 70px; padding: 6px 7px; border: 0.5px solid var(--green-border); border-radius: 4px; font-size: 12px; background: var(--green-bg); color: var(--text); text-align: right; flex-shrink: 0; }
.exp-row .eu { font-size: 11px; color: var(--green-mid); width: 16px; flex-shrink: 0; }
.bx { padding: 3px 7px; border-radius: 4px; border: 0.5px solid var(--green-border); background: transparent; color: #bbb; font-size: 12px; cursor: pointer; flex-shrink: 0; }

/* ── yr exp ── */
.yr-sec { border: 0.5px solid var(--green-border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 6px; }
.yr-hd { background: var(--green-pale); padding: 8px 11px; font-size: 12px; font-weight: 600; color: var(--green-dark); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.yr-bd { padding: 10px 11px; background: #fff; border-top: 0.5px solid var(--green-border); }

/* ── ev list ── */
.ev-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; background: var(--amber-light); border-radius: 6px; padding: 6px 8px; }
.ev-item .ey { font-size: 11px; font-weight: 600; color: var(--amber); width: 38px; flex-shrink: 0; }
.ev-item .ew { font-size: 11px; color: var(--amber); width: 52px; flex-shrink: 0; }
.ev-item .el2 { font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }

/* ── plan tab ── */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.metric { background: var(--green-bg); border-radius: var(--radius-sm); padding: 10px 12px; border: 0.5px solid var(--green-border); }
.metric .ml { font-size: 10px; color: var(--green-mid); margin-bottom: 3px; font-weight: 500; }
.metric .mv { font-size: 18px; font-weight: 600; color: var(--green-dark); }
.metric .mv.neg { color: var(--red); }
.metric .ms { font-size: 10px; color: var(--text3); margin-top: 2px; }
.metric.wide { grid-column: span 2; }
.leg { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; font-size: 11px; color: var(--green-mid); }
.leg span { display: flex; align-items: center; gap: 4px; }
.dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.chart-wrap { position: relative; width: 100%; height: 220px; margin-bottom: 14px; }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-sm); border: 0.5px solid var(--green-border); }
table.tl { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
table.tl th { font-size: 10px; font-weight: 600; color: var(--green-mid); text-align: left; padding: 6px 7px; border-bottom: 0.5px solid var(--green-border); background: var(--green-pale); position: sticky; top: 0; }
table.tl td { padding: 6px 7px; border-bottom: 0.5px solid #E1F5EE; }
table.tl tr:last-child td { border-bottom: none; }
table.tl .nr { text-align: right; font-variant-numeric: tabular-nums; }
table.tl .pos { color: var(--green-mid); font-weight: 500; }
table.tl .neg { color: var(--red); font-weight: 500; }
table.tl tr:hover td { background: var(--green-bg); }
.tev { display: inline-block; background: #E1F5EE; color: var(--green-dark); font-size: 10px; padding: 2px 6px; border-radius: 20px; margin: 1px; white-space: nowrap; }
.tev-custom { background: var(--amber-light); color: var(--amber); }
.tev-exp { background: var(--red-light); color: var(--red); }
.tage { display: inline-block; background: var(--green-pale); color: var(--green-mid); font-size: 10px; padding: 2px 6px; border-radius: 20px; margin: 1px; font-weight: 500; }

/* ── toast ── */
.toast { position: fixed; bottom: calc(80px + var(--safe-bot) + 10px); left: 50%; transform: translateX(-50%); background: var(--green-dark); color: #E1F5EE; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
.toast.show { opacity: 1; }

/* ── panes ── */
.pane { display: none; }
.pane.active { display: block; }
</style>
</head>
<body>
<div class="app">

<div class="header">
  <i class="ti ti-plant-2" style="font-size:22px" aria-hidden="true"></i>
  <h1>ライフプラン シミュレーター</h1>
  <span class="version">v2.0</span>
</div>

<div class="scroll-body">
  <div class="toast" id="toast"></div>

  <!-- ── SAVE TAB ── -->
  <div class="pane active" id="pane-save">
    <div class="save-card">
      <div class="sec">保存済みプランを読み込む</div>
      <div class="save-row">
        <select class="sinput" id="saves-select" style="flex:1"><option value="">— プランを選択 —</option></select>
      </div>
      <div class="save-row">
        <button class="btn btn-p" id="btn-load" style="flex:1"><i class="ti ti-download" aria-hidden="true"></i>読み込む</button>
        <button class="btn btn-d" id="btn-del-save"><i class="ti ti-trash" aria-hidden="true"></i>削除</button>
      </div>
    </div>
    <div class="save-card">
      <div class="sec">現在のプランを保存する</div>
      <div class="save-row">
        <input class="sinput" type="text" id="save-name" placeholder="プラン名を入力（例：2025年プラン）">
      </div>
      <div class="save-row">
        <button class="btn btn-p" id="btn-save" style="flex:1"><i class="ti ti-device-floppy" aria-hidden="true"></i>保存する</button>
      </div>
    </div>
    <div class="card">
      <div class="sec">使い方</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.8">
        <p>① <strong>入力</strong>タブで家族・収入・支出を入力</p>
        <p>② <strong>プラン</strong>タブでグラフ・年表を確認</p>
        <p>③ <strong>保存</strong>タブでデータを保存・読み込み</p>
        <br>
        <p style="color:var(--green-mid)">💡 iPhoneのSafariで「共有」→「ホーム画面に追加」するとアプリのように使えます</p>
      </div>
    </div>
  </div>

  <!-- ── INPUT TAB ── -->
  <div class="pane" id="pane-input">
    <div class="card">
      <div class="sec">家族構成</div>
      <div class="fgrid" id="fam-grid"></div>
      <div class="add-row">
        <input type="text" id="nm-name" placeholder="名前" style="flex:1;min-width:70px">
        <input type="number" id="nm-age" placeholder="年齢" min="0" max="100" style="width:62px">
        <button class="badd" id="btn-add-fam">＋</button>
      </div>
    </div>

    <div class="card">
      <div class="sec">現在の資産・運用</div>
      <div class="row2">
        <div class="field"><label>総貯蓄額（万円）</label><input type="number" id="savings" value="500" min="0" inputmode="numeric"></div>
        <div class="field"><label>運用利回り（%/年）</label><input type="number" id="yield-r" value="3" step="0.1" min="0" max="30" inputmode="decimal"></div>
      </div>
    </div>

    <div class="card">
      <div class="sec">月間収入</div>
      <div class="inc-hdr">
        <span>収入名</span><span>月額</span><span>開始年</span><span>終了年</span><span>増加率%</span><span></span>
      </div>
      <div id="inc-list"></div>
      <div class="add-row">
        <input type="text" id="ni-label" placeholder="収入名" style="flex:1;min-width:70px">
        <input type="number" id="ni-val" placeholder="月額" style="width:54px" inputmode="numeric">
        <input type="number" id="ni-start" placeholder="開始" style="width:58px" inputmode="numeric">
        <input type="number" id="ni-end" placeholder="終了" style="width:58px" inputmode="numeric">
        <input type="number" id="ni-rate" placeholder="%" step="0.1" style="width:48px" inputmode="decimal">
        <button class="badd" id="btn-add-inc">＋</button>
      </div>
    </div>

    <div class="card">
      <div class="sec">月間支出</div>
      <div id="mexp-list"></div>
      <div class="add-row">
        <input type="text" id="nme-label" placeholder="項目名" style="flex:1">
        <input type="number" id="nme-val" placeholder="万円" style="width:62px" inputmode="numeric">
        <button class="badd" id="btn-add-mexp">＋</button>
      </div>
    </div>

    <div class="card">
      <div class="sec">年間特別支出（毎年）</div>
      <div id="aexp-list"></div>
      <div class="add-row">
        <input type="text" id="nae-label" placeholder="項目名" style="flex:1">
        <input type="number" id="nae-val" placeholder="万円" style="width:62px" inputmode="numeric">
        <button class="badd" id="btn-add-aexp">＋</button>
      </div>
    </div>

    <div class="card">
      <div class="sec">年度別の特別支出</div>
      <div id="yrexp-list" style="display:flex;flex-direction:column;gap:5px"></div>
      <div class="add-row">
        <input type="number" id="nye-year" placeholder="西暦" style="width:68px" inputmode="numeric">
        <input type="text" id="nye-label" placeholder="内容" style="flex:1">
        <input type="number" id="nye-val" placeholder="万円" style="width:62px" inputmode="numeric">
        <button class="badd" id="btn-add-yrexp">＋</button>
      </div>
    </div>

    <div class="card">
      <div class="sec">ライフイベント（手動）</div>
      <div id="ev-list" style="margin-bottom:6px"></div>
      <div class="add-row">
        <input type="number" id="nev-year" placeholder="西暦" style="width:68px" inputmode="numeric">
        <input type="text" id="nev-who" placeholder="誰" style="width:72px">
        <input type="text" id="nev-label" placeholder="内容" style="flex:1">
        <button class="badd" id="btn-add-ev">＋</button>
      </div>
    </div>
  </div>

  <!-- ── PLAN TAB ── -->
  <div class="pane" id="pane-plan">
    <div class="metric-grid" id="metric-grid"></div>
    <div class="card">
      <div class="leg">
        <span><span class="dot" style="background:#085041"></span>総資産（万円）</span>
        <span><span class="dot" style="background:#1D9E75"></span>年間収支</span>
        <span><span class="dot" style="background:#D85A30"></span>特別支出あり</span>
      </div>
      <div class="chart-wrap"><canvas id="plan-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="sec" style="margin-top:0">ライフプラン年表（30年）</div>
      <div class="tbl-wrap">
        <table class="tl"><thead id="tl-head"></thead><tbody id="tl-body"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- bottom nav -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="save">
    <i class="ti ti-device-floppy" aria-hidden="true"></i>保存
  </button>
  <button class="nav-item" data-tab="input">
    <i class="ti ti-edit" aria-hidden="true"></i>入力
  </button>
  <button class="nav-item" data-tab="plan">
    <i class="ti ti-chart-line" aria-hidden="true"></i>プラン
  </button>
</nav>

</div>

<script>
const BY = new Date().getFullYear();
const LS_PREFIX = 'lifePlan_';
const fmt = n => Math.round(n).toLocaleString();
const fmtS = n => (n >= 0 ? '+' : '-') + Math.abs(Math.round(n)).toLocaleString();

let family = [{id:1,name:'本人',age:35},{id:2,name:'配偶者',age:33},{id:3,name:'子ども1',age:5}];
let nfid = 4;
let incomes = [
  {id:1,label:'給与（本人）',val:45,startYear:BY,endYear:BY+25,growRate:2},
  {id:2,label:'給与（配偶者）',val:25,startYear:BY,endYear:BY+27,growRate:1}
];
let niid = 3;
let mExps = [{id:1,label:'住居費',val:12},{id:2,label:'食費・日用品',val:8},{id:3,label:'光熱・通信費',val:3},{id:4,label:'教育費',val:3}];
let nmid = 5;
let aExps = [{id:1,label:'車維持費',val:30},{id:2,label:'旅行',val:20}];
let naid = 3;
let yrExps = []; let nyid = 1;
let customEvs = []; let neid = 1;

// toast
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#085041' : '#993C1D';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// localStorage
function lsKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) keys.push(k);
  }
  return keys.sort();
}
function refreshSelect() {
  const sel = document.getElementById('saves-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— プランを選択 —</option>';
  lsKeys().forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    try {
      const d = JSON.parse(localStorage.getItem(k));
      opt.textContent = (d.planName||k.replace(LS_PREFIX,'')) + (d.savedAt?' ('+d.savedAt+')':'');
    } catch(e) { opt.textContent = k.replace(LS_PREFIX,''); }
    if (k===cur) opt.selected=true;
    sel.appendChild(opt);
  });
}

document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('save-name').value.trim();
  if (!name) { showToast('プラン名を入力してください', false); return; }
  const key = LS_PREFIX + name;
  const data = {
    planName: name,
    savedAt: new Date().toLocaleDateString('ja-JP'),
    savings: +document.getElementById('savings').value||0,
    yieldR: +document.getElementById('yield-r').value||0,
    family, incomes, mExps, aExps, yrExps, customEvs
  };
  try {
    localStorage.setItem(key, JSON.stringify(data));
    refreshSelect();
    document.getElementById('saves-select').value = key;
    showToast('「'+name+'」を保存しました ✓');
  } catch(e) { showToast('保存に失敗: '+e.message, false); }
});

document.getElementById('btn-load').addEventListener('click', () => {
  const key = document.getElementById('saves-select').value;
  if (!key) { showToast('プランを選択してください', false); return; }
  try {
    const raw = localStorage.getItem(key);
    if (!raw) throw new Error('データがありません');
    const d = JSON.parse(raw);
    family=d.family||[]; nfid=Math.max(0,...family.map(x=>x.id))+1;
    incomes=d.incomes||[]; niid=Math.max(0,...incomes.map(x=>x.id))+1;
    mExps=d.mExps||[]; nmid=Math.max(0,...mExps.map(x=>x.id))+1;
    aExps=d.aExps||[]; naid=Math.max(0,...aExps.map(x=>x.id))+1;
    yrExps=d.yrExps||[]; nyid=Math.max(0,...yrExps.map(x=>x.id))+1;
    customEvs=d.customEvs||[]; neid=Math.max(0,...customEvs.map(x=>x.id))+1;
    document.getElementById('savings').value=d.savings||500;
    document.getElementById('yield-r').value=d.yieldR||3;
    document.getElementById('save-name').value=d.planName||'';
    renderAll();
    showToast('「'+(d.planName||key)+'」を読み込みました ✓');
  } catch(e) { showToast('読み込み失敗: '+e.message, false); }
});

document.getElementById('btn-del-save').addEventListener('click', () => {
  const key = document.getElementById('saves-select').value;
  if (!key) { showToast('削除するプランを選択してください', false); return; }
  if (!confirm('「'+key.replace(LS_PREFIX,'')+'」を削除しますか？')) return;
  localStorage.removeItem(key);
  refreshSelect();
  showToast('削除しました');
});

// render family
function renderFamily() {
  const g = document.getElementById('fam-grid'); g.innerHTML='';
  family.forEach(m => {
    const d=document.createElement('div'); d.className='fcard';
    d.innerHTML=`<div class="fn"><span>${m.name}</span><button class="bdel" data-id="${m.id}">×</button></div>
<div class="frow"><label>年齢&nbsp;</label><input type="number" value="${m.age}" min="0" max="110" class="fa" data-id="${m.id}" inputmode="numeric"></div>`;
    g.appendChild(d);
  });
  g.querySelectorAll('.fa').forEach(el=>el.addEventListener('input',()=>{const m=family.find(x=>x.id===+el.dataset.id);if(m)m.age=+el.value;}));
  g.querySelectorAll('.bdel').forEach(el=>el.addEventListener('click',()=>{family=family.filter(x=>x.id!==+el.dataset.id);renderFamily();}));
}

// render incomes
function renderInc() {
  const el=document.getElementById('inc-list'); el.innerHTML='';
  incomes.forEach(item=>{
    const r=document.createElement('div'); r.className='irow';
    r.innerHTML=`<span class="il" title="${item.label}">${item.label}</span>
<input type="number" value="${item.val}" min="0" data-id="${item.id}" class="iv" inputmode="numeric">
<input type="number" value="${item.startYear||BY}" data-id="${item.id}" class="is" inputmode="numeric">
<input type="number" value="${item.endYear||BY+30}" data-id="${item.id}" class="ie" inputmode="numeric">
<input type="number" value="${item.growRate||0}" step="0.1" data-id="${item.id}" class="ig" inputmode="decimal">
<button class="bx" data-id="${item.id}">×</button>`;
    el.appendChild(r);
  });
  el.querySelectorAll('.iv').forEach(i=>i.addEventListener('input',()=>{const it=incomes.find(x=>x.id===+i.dataset.id);if(it)it.val=+i.value;}));
  el.querySelectorAll('.is').forEach(i=>i.addEventListener('input',()=>{const it=incomes.find(x=>x.id===+i.dataset.id);if(it)it.startYear=+i.value;}));
  el.querySelectorAll('.ie').forEach(i=>i.addEventListener('input',()=>{const it=incomes.find(x=>x.id===+i.dataset.id);if(it)it.endYear=+i.value;}));
  el.querySelectorAll('.ig').forEach(i=>i.addEventListener('input',()=>{const it=incomes.find(x=>x.id===+i.dataset.id);if(it)it.growRate=+i.value;}));
  el.querySelectorAll('.bx').forEach(b=>b.addEventListener('click',()=>{incomes=incomes.filter(x=>x.id!==+b.dataset.id);renderInc();}));
}

// render exp list
function renderExpList(domId, arr, onDel) {
  const el=document.getElementById(domId); el.innerHTML='';
  arr.forEach(item=>{
    const r=document.createElement('div'); r.className='exp-row';
    r.innerHTML=`<span class="el" title="${item.label}">${item.label}</span><input type="number" value="${item.val}" min="0" data-id="${item.id}" class="lv" inputmode="numeric"><span class="eu">万</span><button class="bx" data-id="${item.id}">×</button>`;
    el.appendChild(r);
  });
  el.querySelectorAll('.lv').forEach(i=>i.addEventListener('input',()=>{const it=arr.find(x=>x.id===+i.dataset.id);if(it)it.val=+i.value;}));
  el.querySelectorAll('.bx').forEach(b=>b.addEventListener('click',()=>{const idx=arr.findIndex(x=>x.id===+b.dataset.id);if(idx>-1){arr.splice(idx,1);onDel();}}));
}

// render yr exp
function renderYrExp() {
  const c=document.getElementById('yrexp-list'); c.innerHTML='';
  const grp={};
  yrExps.sort((a,b)=>a.year-b.year).forEach(e=>{(grp[e.year]=grp[e.year]||[]).push(e);});
  Object.keys(grp).sort().forEach(yr=>{
    const items=grp[yr]; const total=items.reduce((s,x)=>s+x.val,0);
    const block=document.createElement('div'); block.className='yr-sec';
    block.innerHTML=`<div class="yr-hd">📅 ${yr}年 — ${fmt(total)}万円</div>
<div class="yr-bd">${items.map(e=>`<div class="exp-row"><span class="el">${e.label}</span><input type="number" value="${e.val}" min="0" data-id="${e.id}" class="yv" inputmode="numeric"><span class="eu">万</span><button class="bx" data-id="${e.id}">×</button></div>`).join('')}</div>`;
    c.appendChild(block);
    block.querySelector('.yr-hd').addEventListener('click',()=>{const b=block.querySelector('.yr-bd');b.style.display=b.style.display==='none'?'block':'none';});
    block.querySelectorAll('.yv').forEach(i=>i.addEventListener('input',()=>{const e=yrExps.find(x=>x.id===+i.dataset.id);if(e){e.val=+i.value;renderYrExp();}}));
    block.querySelectorAll('.bx').forEach(b=>b.addEventListener('click',()=>{yrExps=yrExps.filter(x=>x.id!==+b.dataset.id);renderYrExp();}));
  });
}

// render custom events
function renderEvList() {
  const el=document.getElementById('ev-list'); el.innerHTML='';
  customEvs.sort((a,b)=>a.year-b.year).forEach(ev=>{
    const r=document.createElement('div'); r.className='ev-item';
    r.innerHTML=`<span class="ey">${ev.year}</span><span class="ew">${ev.who}</span><span class="el2">${ev.label}</span><button class="bx" data-id="${ev.id}" style="background:transparent;border-color:#EF9F27;color:#854F0B">×</button>`;
    el.appendChild(r);
  });
  el.querySelectorAll('.bx').forEach(b=>b.addEventListener('click',()=>{customEvs=customEvs.filter(x=>x.id!==+b.dataset.id);renderEvList();}));
}

// add buttons
document.getElementById('btn-add-fam').addEventListener('click',()=>{
  const n=document.getElementById('nm-name').value.trim()||('家族'+nfid);
  const a=+document.getElementById('nm-age').value||0;
  family.push({id:nfid++,name:n,age:a});
  document.getElementById('nm-name').value=''; document.getElementById('nm-age').value='';
  renderFamily();
});
document.getElementById('btn-add-inc').addEventListener('click',()=>{
  const l=document.getElementById('ni-label').value.trim(); if(!l) return;
  incomes.push({id:niid++,label:l,val:+document.getElementById('ni-val').value||0,startYear:+document.getElementById('ni-start').value||BY,endYear:+document.getElementById('ni-end').value||BY+30,growRate:+document.getElementById('ni-rate').value||0});
  ['ni-label','ni-val','ni-start','ni-end','ni-rate'].forEach(id=>document.getElementById(id).value='');
  renderInc();
});
document.getElementById('btn-add-mexp').addEventListener('click',()=>{
  const l=document.getElementById('nme-label').value.trim(); if(!l) return;
  mExps.push({id:nmid++,label:l,val:+document.getElementById('nme-val').value||0});
  document.getElementById('nme-label').value=''; document.getElementById('nme-val').value='';
  renderExpList('mexp-list',mExps,()=>renderExpList('mexp-list',mExps,()=>{}));
});
document.getElementById('btn-add-aexp').addEventListener('click',()=>{
  const l=document.getElementById('nae-label').value.trim(); if(!l) return;
  aExps.push({id:naid++,label:l,val:+document.getElementById('nae-val').value||0});
  document.getElementById('nae-label').value=''; document.getElementById('nae-val').value='';
  renderExpList('aexp-list',aExps,()=>renderExpList('aexp-list',aExps,()=>{}));
});
document.getElementById('btn-add-yrexp').addEventListener('click',()=>{
  const yr=+document.getElementById('nye-year').value; const l=document.getElementById('nye-label').value.trim(); if(!yr||!l) return;
  yrExps.push({id:nyid++,year:yr,label:l,val:+document.getElementById('nye-val').value||0});
  document.getElementById('nye-year').value=''; document.getElementById('nye-label').value=''; document.getElementById('nye-val').value='';
  renderYrExp();
});
document.getElementById('btn-add-ev').addEventListener('click',()=>{
  const yr=+document.getElementById('nev-year').value; const l=document.getElementById('nev-label').value.trim(); if(!yr||!l) return;
  customEvs.push({id:neid++,year:yr,who:document.getElementById('nev-who').value.trim()||'家族',label:l});
  document.getElementById('nev-year').value=''; document.getElementById('nev-who').value=''; document.getElementById('nev-label').value='';
  renderEvList();
});

// tabs
document.querySelectorAll('.nav-item').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('pane-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='plan') buildPlan();
  if(t.dataset.tab==='save') refreshSelect();
  document.querySelector('.scroll-body').scrollTop=0;
}));

// auto events
function getAutoEvs(year) {
  const evs=[];
  family.forEach(m=>{
    const age=m.age+(year-BY);
    if(age===3) evs.push(m.name+'保育園');
    if(age===6) evs.push(m.name+'小学入学');
    if(age===12) evs.push(m.name+'中学入学');
    if(age===15) evs.push(m.name+'高校入学');
    if(age===18) evs.push(m.name+'大学入学');
    if(age===22) evs.push(m.name+'大学卒業');
    if(age===60) evs.push(m.name+'定年');
    if(age===65) evs.push(m.name+'年金開始');
  });
  return evs;
}
function calcAnnualIncome(year) {
  return incomes.reduce((s,inc)=>{
    if(year<(inc.startYear||BY)||year>(inc.endYear||BY+50)) return s;
    return s+inc.val*Math.pow(1+(inc.growRate||0)/100,year-(inc.startYear||BY))*12;
  },0);
}

// build plan
let chart=null;
function buildPlan() {
  const savings=+document.getElementById('savings').value||0;
  const yieldR=(+document.getElementById('yield-r').value||0)/100;
  const annMExp=mExps.reduce((s,x)=>s+x.val,0)*12;
  const annAExp=aExps.reduce((s,x)=>s+x.val,0);
  const baseExp=annMExp+annAExp;
  const YEARS=30;
  const yrExpMap={};
  yrExps.forEach(e=>{yrExpMap[e.year]=(yrExpMap[e.year]||0)+e.val;});
  const custEvMap={};
  customEvs.forEach(e=>{(custEvMap[e.year]=custEvMap[e.year]||[]).push(e);});

  const labels=[],assetArr=[],balArr=[],dotColors=[];
  let asset=savings;
  for(let i=0;i<=YEARS;i++){
    const yr=BY+i,annInc=calcAnnualIncome(yr),extra=yrExpMap[yr]||0;
    const bal=annInc-(baseExp+extra);
    labels.push(yr+''); assetArr.push(Math.round(asset)); balArr.push(Math.round(bal));
    dotColors.push(extra>0?'#D85A30':'#085041');
    asset=asset*(1+yieldR)+bal;
  }

  const curInc=calcAnnualIncome(BY);
  const savRate=curInc>0?Math.round((curInc-baseExp)/curInc*100):0;
  document.getElementById('metric-grid').innerHTML=`
<div class="metric"><div class="ml">現在の総資産</div><div class="mv">${fmt(savings)}万円</div><div class="ms">利回り ${document.getElementById('yield-r').value}%</div></div>
<div class="metric"><div class="ml">月間収支（現在）</div><div class="mv ${(curInc-baseExp)/12<0?'neg':''}">${fmtS((curInc-baseExp)/12)}万円</div><div class="ms">貯蓄率 ${savRate}%</div></div>
<div class="metric"><div class="ml">10年後の予測資産</div><div class="mv">${fmt(assetArr[10])}万円</div><div class="ms">${BY+10}年</div></div>
<div class="metric"><div class="ml">20年後の予測資産</div><div class="mv">${fmt(assetArr[20])}万円</div><div class="ms">${BY+20}年</div></div>
<div class="metric wide"><div class="ml">30年後の予測資産</div><div class="mv">${fmt(assetArr[30])}万円</div><div class="ms">${BY+30}年</div></div>`;

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('plan-chart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'総資産',data:assetArr,borderColor:'#085041',backgroundColor:'rgba(8,80,65,0.1)',fill:true,tension:.35,pointRadius:assetArr.map((_,i)=>yrExpMap[BY+i]?5:3),pointBackgroundColor:dotColors,borderWidth:2},
      {label:'年間収支',data:balArr,borderColor:'#1D9E75',borderDash:[4,3],fill:false,tension:0,pointRadius:0,borderWidth:1.5,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.parsed.y)+'万円'}}},
      scales:{
        x:{ticks:{maxRotation:45,autoSkip:true,maxTicksLimit:12,font:{size:10},color:'#0F6E56'},grid:{color:'rgba(15,110,86,.07)'}},
        y:{ticks:{callback:v=>fmt(v),font:{size:10},color:'#0F6E56'},grid:{color:'rgba(15,110,86,.07)'}},
        y2:{position:'right',ticks:{font:{size:10},color:'#1D9E75'},grid:{drawOnChartArea:false}}
      }
    }
  });

  const headFam=family.map(m=>`<th>${m.name}</th>`).join('');
  document.getElementById('tl-head').innerHTML=`<tr><th>西暦</th>${headFam}<th class="nr">年間収入</th><th class="nr">通常支出</th><th class="nr">特別支出</th><th class="nr">年間収支</th><th class="nr">累計資産</th><th>イベント</th></tr>`;

  let a2=savings; const rows=[];
  for(let i=1;i<=YEARS;i++){
    const yr=BY+i,annInc=calcAnnualIncome(yr),extra=yrExpMap[yr]||0;
    const exp=baseExp+extra,bal=annInc-exp;
    a2=a2*(1+yieldR)+bal;
    const autoEvs=getAutoEvs(yr),cEvs=custEvMap[yr]||[],yrItems=yrExps.filter(e=>e.year===yr);
    const evHtml=[
      ...autoEvs.map(e=>`<span class="tev">${e}</span>`),
      ...cEvs.map(e=>`<span class="tev tev-custom">${e.who}: ${e.label}</span>`),
      ...yrItems.map(e=>`<span class="tev tev-exp">${e.label} ${fmt(e.val)}万</span>`)
    ].join('');
    const famAges=family.map(m=>`<td class="nr"><span class="tage">${m.age+i}歳</span></td>`).join('');
    rows.push(`<tr><td style="font-weight:600;color:#085041">${yr}</td>${famAges}<td class="nr">${fmt(annInc)}</td><td class="nr">${fmt(baseExp)}</td><td class="nr ${extra>0?'neg':''}">${extra>0?fmt(extra):'—'}</td><td class="nr ${bal>=0?'pos':'neg'}">${fmtS(bal)}</td><td class="nr" style="font-weight:600">${fmt(Math.round(a2))}</td><td>${evHtml||'—'}</td></tr>`);
  }
  document.getElementById('tl-body').innerHTML=rows.join('');
}

function renderAll() {
  renderFamily(); renderInc();
  renderExpList('mexp-list',mExps,()=>renderExpList('mexp-list',mExps,()=>{}));
  renderExpList('aexp-list',aExps,()=>renderExpList('aexp-list',aExps,()=>{}));
  renderYrExp(); renderEvList();
}

// PWA service worker
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

renderAll();
refreshSelect();
</script>
